---
lookup_options:
  profile_pam_access::allow_rules:
    merge: "hash"
  profile_pam_access::deny_first_rules:
    merge: "hash"
  profile_pam_access::deny_rules:
    merge: "hash"
  profile_pam_access::pam_config:
    merge: "hash"

profile_pam_access::allow_rules:
  "root defaults":
    user: "root"
    origin: "cron crond 127.0.0.1 :0 tty"
profile_pam_access::deny_first_rules:
  "ALL deny for cron":
    user: "ALL"
    origin: "cron crond"
  "deny all_disabled_usr":
    group: "all_disabled_usr"
    origin: "ALL"
profile_pam_access::deny_rules: {}
profile_pam_access::pam_config:
  "profile_pam_access Enforce access.conf in sshd":
    ensure: "present"
    service: "sshd"
    type: "account"
    control: "required"
    module: "pam_access.so"
    position: "before module pam_nologin.so"
  "profile_pam_access bypass nologin for ansible and qualys":
    ensure: "present"
    service: "sshd"
    type: "account"
    control: "include"
    module: "sshd-ansible-qualys"
    position: "after module pam_access.so"
  "add sshd-ansible-qualys service":
    ensure: "present"
    service: "sshd-ansible-qualys"
    type: "account"
    control: "sufficient"
    module: "pam_succeed_if.so"
    arguments:
      - "user"
      - "ingroup"
      - "ansible:qualys"
      - "quiet_fail"
